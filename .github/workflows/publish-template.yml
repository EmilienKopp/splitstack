name: Publish Template

on:
  push:
    branches: [ main ]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare clean template
        run: |
          rm -rf packages/
          jq 'del(.repositories) | del(.["prefer-stable"])' composer.json > composer.clean.json
          mv composer.clean.json composer.json

      - uses: cpina/github-action-push-to-another-repository@v1.7.2
        env:
          SSH_DEPLOY_KEY: ${{ secrets.TEMPLATE_DEPLOY_KEY }}
        with:
          source-directory: .
          destination-github-username: EmilienKopp
          destination-repository-name: splitstack-starter-kit
          user-email: github-actions[bot]@users.noreply.github.com
          user-name: github-actions[bot]
          target-branch: main
